name: Code quality checks
permissions: read-all
on: [push]

jobs:
  ruff:
    name: Ruff lint & format
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint backend
        uses: astral-sh/ruff-action@v3
        with:
          src: "./backend"

      # since the ruff actions adds ruff to PATH, this is okay
      - name: Format backend
        run: "ruff format --check --diff ./backend"

  ty:
    name: ty typecheck
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          working-directory: "./backend"

      - name: Type check backend
        run: "uvx ty check --python ./backend/.venv --output-format github ./backend"
